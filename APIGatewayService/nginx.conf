user  nginx;
worker_processes  auto;

# TODO: Pin nginx to a specific version for reproducibility and avoid unexpected upgrades in production.
# TODO: Switch to a non-root port and enforce that nginx does not run as root if possible.
# TODO: Fine-tune worker_processes and worker_connections based on expected production load and hardware.
# TODO: Set up appropriate logging (access_log and error_log) with log rotation.
# TODO: Configure error_page directives for user-friendly and secure error responses.
# TODO: Move secrets/credentials out of configuration files; use environment variables or secrets management.
# TODO: Enable gzip and Brotli compression for JSON API responses if applicable.
# TODO: Set up HTTPS with a strong TLS configuration and enable HSTS when ready for HTTPS.
# TODO: Restrict access to server-status and other sensitive endpoints.
# TODO: Run nginx as a non-root user after binding to ports (if OS allows).
# TODO: Harden filesystem permissions on configuration and log files.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ✅ Define global rate limit zone properly (inside http block)
    # 10m = ~160,000 IP entries
    limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=5r/s;

    # Include extra config files
    include /etc/nginx/conf.d/headers.conf;
    include /etc/nginx/conf.d/default.conf;

    sendfile        on;
    keepalive_timeout  65;
}
