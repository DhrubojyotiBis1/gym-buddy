# ----------- UPSTREAMS -----------
upstream auth_service {
    least_conn;
    server authentication:8000 max_fails=2 fail_timeout=5s;
    keepalive 64;
}


upstream new_job_request {
    least_conn;
    server new_job_request:8002 max_fails=2 fail_timeout=5s;
    keepalive 64;
}

upstream bid {
    least_conn;
    server bid:8003 max_fails=2 fail_timeout=5s;
    keepalive 64;
}

upstream user_api {
    least_conn;
    server user_api:8001 max_fails=2 fail_timeout=5s;
    keepalive 64;
}

upstream bid_notifier {
    least_conn;
    server bid_notifier:8004 max_fails=2 fail_timeout=5s;
    keepalive 64;
}

upstream direct_chat_service {
    least_conn;
    server direct_chat_service:8005 max_fails=2 fail_timeout=5s;
    keepalive 64;
}

# ----------- SERVER -----------
server {
    listen 80 default_server;
    server_name _;

    # Security Headers
    include /etc/nginx/conf.d/headers.conf;

    # Restrict allowed HTTP methods globally (optional, adjust as needed)
    if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS|PATCH)$ ) {
        return 405;
    }

    # Deny access to hidden files (security best practice)
    location ~ /\.(?!well-known) {
        deny all;
    }

    #TODO: Add Logging 

    # ======================
    # Authentication Service
    # ======================
    location /authentication/ {
        include /etc/nginx/conf.d/rate-limit.conf;
        proxy_pass http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_set_header Connection "";
    }

    # ======================
    # New Job Request Service
    # ======================
    location /new-job-request/ {
        include /etc/nginx/conf.d/rate-limit.conf;
        proxy_pass http://new_job_request;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_set_header Connection "";
    }

    # ================
    # Bid Service
    # ================
    location /bid/ {
        include /etc/nginx/conf.d/rate-limit.conf;
        proxy_pass http://bid;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_set_header Connection "";
    }

    # ================
    # User Service
    # ================
    location /user/ {
        include /etc/nginx/conf.d/rate-limit.conf;
        proxy_pass http://user_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_set_header Connection "";
    }

    # =======================
    # Bid Notifier Service
    # =======================
    location /bid-notifier/ {
        include /etc/nginx/conf.d/rate-limit.conf;
        proxy_pass http://bid_notifier;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;  # Wait up to 10s to connect to bid_notifier
        proxy_send_timeout 35s;     # Wait up to 15s to send the full HTTP request to bid_notifier
        proxy_read_timeout 35s;     # Wait up to 15s to receive the HTTP response from bid_notifier
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_ignore_client_abort on;
        chunked_transfer_encoding on;
        proxy_cache off;
    }

    # ===========================
    # Direct Chat Service (WebSocket)
    # ===========================
    location /direct-chat/ws {
        proxy_pass http://direct_chat_service;

        # REQUIRED for WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important timeouts for WS
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Default fallback: return 404 for everything else
    location / {
        return 404;
    }
}

