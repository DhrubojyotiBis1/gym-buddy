version: '3.8'

services:
  # Authentication Service
  auth-service:
    build:
      context: ./AuthenticationService
      dockerfile: Dockerfile
    container_name: authentication
    ports:
      - "8000:8000"  # External access for auth API
    depends_on:
      - user-grpc
    networks:
      - microservices-network

  # User Service (REST API)
  user_api:
    build:
      context: ./UserService
      dockerfile: Dockerfile.api
    container_name: user_api
    ports:
      - "8001:8001"  # External access for user API
    depends_on:
      - auth-service
      - user-grpc
      - postgres
    networks:
      - microservices-network

  # User Service (gRPC)
  user-grpc:
    build:
      context: ./UserService
      dockerfile: Dockerfile.grpc
    container_name: user-grpc
    ports:
      - "50051:50051"  # gRPC port
    depends_on:
      - postgres
    networks:
      - microservices-network

  # New Job Request Service
  new_job_request:
    build:
      context: ./NewJobRequestService
      dockerfile: Dockerfile
    container_name: new_job_request
    ports:
      - "8002:8002"
    depends_on:
      - postgres
    networks:
      - microservices-network

  bid:
    build:
      context: ./BidService
      dockerfile: Dockerfile
    container_name: bid
    ports:
      - "8003:8003"
    depends_on:
      - redis
      - postgres
    networks:
      - microservices-network

  bid_notifier:
    build:
      context: ./BidNotifierService
      dockerfile: Dockerfile
    container_name: bid_notifier
    ports:
      - "8004:8004"
    depends_on:
      - redis
    networks:
      - microservices-network
  
  # Direct Chat Service
  direct_chat_service:
    build:
      context: ./ChatService/DirectChatService
      dockerfile: Dockerfile
    container_name: direct_chat_service
    ports:
      - "8005:8005"
    depends_on:
      - redis
      - kafka
      - postgres
    networks:
      - microservices-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - microservices-network

  api-gateway:
    build:
      context: ./APIGatewayService
      dockerfile: Dockerfile
    container_name: apigateway
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - user-grpc
      - new_job_request
      - bid
      - redis
      - user_api
    networks:
      - microservices-network
  
  # Redpanda Console (Kafka UI)
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    restart: unless-stopped
    ports:
      - "8081:8080"   # External web access (host:container)
    environment:
      - KAFKA_BROKERS=kafka:9094           # Use variable assignment format
      - KAFKA_TLS_ENABLED=false
      - KAFKA_SASL_ENABLED=false
      - SERVER_LISTEN_PORT=8080
      - CONSOLE_LOG_LEVEL=info
    depends_on:
      - kafka
    networks:
      - microservices-network

  # Kafka (KRaft mode - no Zookeeper)
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"   # external
      - "9094:9094"   # internal (for docker network)
    environment:
      # === KRaft mode (no ZooKeeper) ===
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - microservices-network

  postgres:
    image: postgres:14
    container_name: gym_buddy_postgres
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_DB: gym_buddy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    networks:
      - microservices-network

# Create a custom bridge network
networks:
  microservices-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Named volumes for data persistence
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
    name: redis-production-data
  kafka-data:
    driver: local
    name: kafka-production-data
